name: Meter
options:
  bundleIdPrefix: com.darius
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  Meter:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    info:
      path: Info.plist
      properties:
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "2"
        NSLocationWhenInUseUsageDescription: "Meter tracks the miles you drive during a dash so you have a mileage record."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Allow Always so Meter can keep counting miles while you navigate in another app or your screen is off."
        UIBackgroundModes:
          - location
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: 1
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.9"
